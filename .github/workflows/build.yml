name: Build

on:
  workflow_call:
    inputs:
      build_android:
        description: Run Android APK build (e.g. push to main only)
        required: false
        type: boolean
        default: false

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

  android:
    if: inputs.build_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release
