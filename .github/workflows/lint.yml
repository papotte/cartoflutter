name: Lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm install
      - run: npm run lint
