name: cartographers
description: "A Flutter adaptation of Cartographers: A Roll Player Tale."

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  async: ^2.11.0
  audioplayers: ^6.0.0
  cloud_firestore: ^5.6.0
  collection: ^1.18.0
  firebase_auth: ^5.5.0
  firebase_core: ^3.13.0
  go_router: ^16.0.0
  logging: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  test: ^1.24.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/music/
    - assets/sfx/

  fonts:
    - family: Permanent Marker
      fonts:
        - asset: assets/fonts/Permanent_Marker/PermanentMarker-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#F4E8C8"
  adaptive_icon_foreground: "assets/icons/icon-adaptive-foreground.png"
